<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN_PAGE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        a:hover {
            background-color: ghostwhite color: rgb(12, 171, 219);
        }

        p {
            color: blue;

            padding: 0px;
        }

        .hi {
            color: red;

        }



        body {
            font-family: Arial, sans-serif;
            background-color: rgb(17, 34, 182);
            /* Light blue background */
        }

        form {
            width: 320px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
            /* White form */
            border: 2px solid #2196f3;
            /* Blue border */
        }

        form div {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            color: #0d47a1;
            /* Dark blue label text */
        }

        input {
            width: 100%;
            padding: 6px;
            border: 1px solid #90caf9;
            /* Light blue border */
        }

        input[type="submit"] {
            background-color: #2196f3;
            /* Blue button */
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #1976d2;
            /* Darker blue on hover */
        }

        input[type="reset"] {
            background-color: #f44336;
            /* Red button */
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="reset"]:hover {
            background-color: #d32f2f;
            /* Darker red on hover */
        }
    </style>

    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <form>

        <div>

            <label for="fname">First Name:</label>
            <input type="text" name="" id="fname" placeholder="Enter your name">
        </div>
        <div>
            <label for=""> Password :</label>
            <input type="password" name="" id="" placeholder="Enter the strong password">

        </div>
        <div>
            <label for="">Enter the E-mail :</label>
            <input type="email" name="" id="" placeholder="Enter the E-mail">


        </div>
        <div>
            <label for=""> Your DOB :</label>
            <input type="date" name="" id="">
        </div>
        <div>
            <label for="">Your Age </label>
            <input type="number" name="" id="" min="0" max="89" placeholder="Enter your Present age">

        </div>
        <div>
            <input type="reset" value="Reset">
        </div>
        <div>

            <input type="submit" value="Click me">
        </div>

        <p>

            <a class="hi" href="https://www.google.com"><i class="fa-brands fa-google"></i></a>
            <a href="https://www.facebook.com"><i class="fa-brands fa-facebook"></i></a>
        </p>

    </form>
</body>

</html>
