<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#202123;
    color:white;
    height:100vh;
}

.app{
    display:flex;
    height:100vh;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:#171717;
    padding:15px;
    display:flex;
    flex-direction:column;
}

.new-chat{
    background:#343541;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
}

.chat-item{
    background:#2a2b32;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
    cursor:pointer;
}

.chat-item:hover{
    background:#3b3c45;
}

/* Chat Area */

.chat-container{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    padding:18px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    max-width:70%;
    padding:12px 16px;
    border-radius:12px;
    line-height:1.5;
}

.user{
    background:#10a37f;
    align-self:flex-end;
}

.bot{
    background:#343541;
    align-self:flex-start;
}

.input-area{
    display:flex;
    padding:15px;
    gap:10px;
    border-top:1px solid #333;
}

.input-area input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#40414f;
    color:white;
    outline:none;
}

.input-area button{
    padding:14px 20px;
    border:none;
    border-radius:8px;
    background:#10a37f;
    color:white;
    cursor:pointer;
}

.input-area button:hover{
    background:#0e8d6f;
}

/* Mobile */

@media(max-width:768px){
    .sidebar{
        display:none;
    }

    .message{
        max-width:90%;
    }
}
</style>
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <button class="new-chat">+ New Chat</button>

        <div class="chat-item">Chat 1</div>
        <div class="chat-item">Chat 2</div>
        <div class="chat-item">Chat 3</div>
    </aside>

    <main class="chat-container">

        <div class="header">
            ChatGPT Clone
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                Hello! How can I help you today?
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="userInput"
                placeholder="Message ChatGPT..."
            >
            <button onclick="sendMessage()">Send</button>
        </div>

    </main>

</div>

<script>
const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");

function sendMessage() {
    const text = userInput.value.trim();

    if(!text) return;

    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.textContent = text;
    chatBox.appendChild(userMsg);

    userInput.value = "";

    chatBox.scrollTop = chatBox.scrollHeight;

    setTimeout(() => {
        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.textContent =
        "This is a ChatGPT UI clone. Connect an AI API for real responses.";
        chatBox.appendChild(botMsg);

        chatBox.scrollTop = chatBox.scrollHeight;
    }, 700);
}

userInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
