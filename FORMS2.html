<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
</head>
<body>
    <h2>Job Application</h2>
    <form >
        <label for="namee">Name:</label>
        <input type="text" placeholder="Enter your name">
        <br>
        <br>
        <label for="emails">E-mail:</label>
        <input type="email" name="emails" id="emails" placeholder="Enter your E-mail">
        <br>
        <br>
        <label for="tl">Phone number:</label>
        <input type="tel" name="tl" id="tl" placeholder="Enter your Number">
        <br>
        <br>
        <label for="id3">Resume:</label>
        <input type="file" name="id3" id="id3">
        <br>
        <br>
        <label for="id4">Experience(in Years):</label>
        <input type="number" id="id4" min="0" max="14">
        <br>
        <br>
        <fieldset>
            <legend>Skills</legend>


            <label for="m1">HTML</label>
            <br>
            <input type="checkbox" name="m1" id="m1">
            <br>
            <br>
            <label for="m2">CSS</label>
            <br>
            <input type="checkbox" name="m2" id="m2">
            <br>
            <br>
            <label for="m3">JAVA SCRIPT</label>
            <br>
            <input type="checkbox" name="m3" id="m3">
            <br>
        </fieldset>
        <br>
        <label for="a1">Highest Education:</label>
        <select name="a1" id="a1">
            <option value="High School">High School</option>
            <option value="12 th">12 th</option>
            <option value="Degree">Degree</option>
            <option value="Post Graduation ">Post Graduation</option>
        </select>
        <br>
        <br>
        <fieldset>
            <legend>Availability</legend>
            <br>
            <label for="p1">PART-TIME</label>
            <input type="radio" name="p1" id="p1">
            <br>
            <label for="p2">FULL-TIME</label>
            <input type="radio" name="p1" id="p2">
        </fieldset>
        <br>
        <label for="commenting">Additional Comments:</label>
        <br>
        <textarea name="commenting" id="commenting" cols="21" rows="20">Comment what in ur mind. </textarea>
        <input type="button" value="Register">


    </form>
</body>
</html>
