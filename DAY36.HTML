<!DOCTYPE html>
<html>

<head>
    <title>Two Boxes</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .box {
            width: 200px;
            padding: 20px;
            margin: 15px;
            border: 3px solid black;
            background-color: lightblue;
            text-align: center;
            font-size: 18px;
            transition: 0.3s;
        }

        .box:hover {
            background-color: red;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
    </div>

</body>

</html>
