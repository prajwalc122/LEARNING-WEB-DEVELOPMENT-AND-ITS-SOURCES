<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Clone</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: black;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .logo {
            color: red;
            font-size: 40px;
            font-weight: bold;
        }

        .signin-btn {
            background: red;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .email-box {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .email-box input {
            padding: 15px;
            width: 350px;
            max-width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .email-box button {
            background: red;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
        }

        /* MOVIE SECTION */
        .movies {
            padding: 50px;
        }

        .movies h2 {
            margin-bottom: 20px;
            font-size: 32px;
        }

        .movie-row {
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }

        .movie-row img {
            width: 250px;
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
        }

        .movie-row img:hover {
            transform: scale(1.08);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: gray;
            border-top: 1px solid #333;
        }

        /* RESPONSIVE */
        @media(max-width:768px) {

            .hero-content h1 {
                font-size: 40px;
            }

            .hero-content p {
                font-size: 18px;
            }

            .navbar {
                padding: 20px;
            }

            .logo {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">NETFLIX</div>
        <button class="signin-btn">Sign In</button>
    </div>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <h1>Unlimited movies, TV shows and more</h1>
            <p>Watch anywhere. Cancel anytime.</p>
            <p>Ready to watch? Enter your email to create or restart membership.</p>

            <div class="email-box">
                <input type="email" placeholder="Enter your email">
                <button>Get Started</button>
            </div>
        </div>
    </section>

    <!-- MOVIES -->
    <section class="movies">
        <h2>Popular Movies</h2>

        <div class="movie-row">

            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=500&auto=format&fit=crop">

            <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=500&auto=format&fit=crop">

            <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=500&auto=format&fit=crop">

            <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=500&auto=format&fit=crop">

            <img src="https://images.unsplash.com/photo-1513106580091-1d82408b8cd6?q=80&w=500&auto=format&fit=crop">

        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>Netflix Clone using HTML & CSS</p>
    </footer>

</body>

</html>
