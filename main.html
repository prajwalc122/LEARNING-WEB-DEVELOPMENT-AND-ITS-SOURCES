<!DOCTYPE html>
<html>
<head>
    <title>Simple Toggle Website</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: white;
            color: black;
            transition: 0.3s;
        }

        .dark{
            background: black;
            color: white;
        }

        button{
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website</h1>
    <p>Click the button to change theme.</p>

    <button onclick="toggleMode()">Toggle Mode</button>

    <script>
        function toggleMode(){
            document.body.classList.toggle("dark");
        }
    </script>

</body>
</html>
