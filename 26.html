<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #0077cc;
            color: white;
            padding: 20px;
        }

        .container {
            margin: 30px;
        }

        .card {
            background-color: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        button {
            background-color: #0077cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>

</head>
<body>

    <header>
        <h1>Prajwal C</h1>
        <p>BCA Student | Cybersecurity Learner</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>About Me</h2>
            <p>I am a BCA student interested in Cybersecurity, Python, C Programming, and Web Development.</p>

            <button>Contact Me</button>
        </div>
    </div>

</body>
</html>
