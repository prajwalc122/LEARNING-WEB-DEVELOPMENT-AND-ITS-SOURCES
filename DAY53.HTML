<!DOCTYPE html>
<html>

<head>
    <title>Simple Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .form-box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

    <div class="form-box">
        <h2>Register</h2>

        <form>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">

            <button>Submit</button>
        </form>
    </div>

</body>

</html>
