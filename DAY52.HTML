<!DOCTYPE html>
<html>

<head>
    <title>My Profile</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            text-align: center;
        }

        .card {
            background: white;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        h2 {
            margin: 10px 0;
        }

        p {
            color: gray;
        }

        button {
            background: blue;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="/DAY/Virat Kholi.jpg" alt="Profile">

        <h2>Prajwal c</h2>
        <p>Web Developer | Student</p>

        <p>I am learning HTML & CSS. I love coding and building websites.</p>

        <button>Follow</button>
    </div>

</body>

</html>
