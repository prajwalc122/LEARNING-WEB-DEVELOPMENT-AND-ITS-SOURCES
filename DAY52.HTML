<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!DOCTYPE html>
    <html>

    <head>
        <title>Box Model Example</title>

        <style>
            .box {
                width: 300px;
                height: 150px;

                background-color: lightblue;

                padding: 20px;
                /* inside space */
                border: 5px solid black;
                /* border */
                margin: 30px;
                /* outside space */

                font-size: 20px;
            }
        </style>
    </head>

    <body>

        <div class="box">
            This is Box Model Example
        </div>

    </body>

    </html>
</body>

</html>
