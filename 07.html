<!DOCTYPE html>
<html>
<head>
    <title>Text Formatting Tags</title>
</head>
<body>

    <!-- <b> tag makes text bold -->
    <p>This is <b>Bold Text</b></p>

    <!-- <strong> tag indicates important text (also appears bold) -->
    <p>This is <strong>Important Text</strong></p>

    <!-- <i> tag makes text italic -->
    <p>This is <i>Italic Text</i></p>

    <!-- <em> tag emphasizes text (usually italic) -->
    <p>This is <em>Emphasized Text</em></p>

    <!-- <u> tag underlines text -->
    <p>This is <u>Underlined Text</u></p>

    <!-- <mark> tag highlights text -->
    <p>This is <mark>Highlighted Text</mark></p>

    <!-- <small> tag displays smaller text -->
    <p>This is <small>Small Text</small></p>

    <!-- <del> tag shows deleted text with a strike-through line -->
    <p>Old Price: <del>₹1000</del></p>

    <!-- <ins> tag shows inserted text (usually underlined) -->
    <p>New Price: <ins>₹800</ins></p>

    <!-- <sub> tag displays subscript text -->
    <p>2 kelagade ge use madtare: H<sub>2</sub>O</p>

    <!-- <sup> tag displays superscript text -->
    <p>2 melgade ge use madtare: x<sup>2</sup></p>

    <!-- <code> tag is used to display programming code -->
    <p>Python Statement: <code>print("Hello World")</code></p>

</body>
</html>
