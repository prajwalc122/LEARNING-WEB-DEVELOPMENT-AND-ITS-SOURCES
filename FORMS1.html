<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Event Registration</h2>
    <form >
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your name">
        <br>
        <br>
        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email" placeholder="Enter your Email...">
        <br>
        <br>
        <label for="tl">Phone number:</label>
        <input type="tel" name="tl" id="tl" placeholder="Enter your number">
        <br>
        <br>
        <label for="occupation">occupation</label>
        <select name="occupation" id="occupation">
            <option value="Student">Student</option>
            <option value="Professional">Professional</option>
            <option value="Others">Others</option>
        </select>
        <br>
        <br>
        <fieldset>
            <legend>Topics of Intrest.</legend>

            <label for="checking">HTML</label>
            <input type="checkbox" name="checking" id="checking">

            <label for="checking2">CSS</label>
            <input type="checkbox" name="checking2" id="checking2">

            <label for="checking3">JAVA SCRIPT</label>
            <input type="checkbox" name="checking3" id="checking3">
        </fieldset>
        <br>
        <label for="commenting">Comments:</label>
        <br>
        <textarea name="commenting" id="commenting" cols="32" rows="30">Comment what in ur mind. </textarea>
        <input type="button" value="Register">
    </form>
</body>
</html>
