<!DOCTYPE html>
<html>

<head>
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f4f4;
        }

        /* Navigation bar */

        nav {
            background: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 10px;
        }

        /* Hero section */

        .hero {
            text-align: center;
            padding: 60px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        .hero h1 {
            font-size: 40px;
        }

        /* Cards section */

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        /* Contact form */

        .contact {
            background: white;
            padding: 40px;
            text-align: center;
        }

        input,
        textarea {
            width: 300px;
            padding: 10px;
            margin: 10px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <!-- Navigation -->

    <nav>
        <div><b>Prajwal Website</b></div>

        <div>
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- Hero Section -->

    <section class="hero">

        <h1>Welcome to My Website</h1>
        <p>I am learning Web Development</p>

    </section>

    <!-- Services -->

    <section class="container">

        <div class="card">
            <img src="https://via.placeholder.com/250">
            <h3>Web Design</h3>
            <p>I create beautiful websites using HTML and CSS.</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250">
            <h3>Programming</h3>
            <p>I am learning Java, C and Python.</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250">
            <h3>Cyber Security</h3>
            <p>I am interested in ethical hacking.</p>
        </div>

    </section>

    <!-- Contact Form -->

    <section class="contact">

        <h2>Contact Me</h2>

        <form>

            <input type="text" placeholder="Your Name"><br>

            <input type="email" placeholder="Your Email"><br>

            <textarea placeholder="Your Message"></textarea><br>

            <button>Send Message</button>

        </form>

    </section>

    <footer>

        <p>© 2026 Prajwal Website</p>

    </footer>

</body>

</html>
