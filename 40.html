<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #555;
            text-align: center;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        .hero {
            text-align: center;
            padding: 50px;
            background-color: #f4f4f4;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
        }

        .card {
            width: 250px;
            padding: 20px;
            border: 1px solid #ddd;
            text-align: center;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Prajwal Portfolio</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        <h2>Welcome to My Website</h2>
        <p>BCA Student | Web Developer | Cybersecurity Learner</p>
    </section>

    <div class="container">

        <div class="card">
            <h3>HTML</h3>
            <p>Structure of websites.</p>
        </div>

        <div class="card">
            <h3>CSS</h3>
            <p>Styling and layouts.</p>
        </div>

        <div class="card">
            <h3>JavaScript</h3>
            <p>Adds interactivity.</p>
        </div>

    </div>

    <footer>
        <p>© 2026 Prajwal</p>
    </footer>

</body>
</html>
