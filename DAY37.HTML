<!DOCTYPE html>
<html>

<head>
    <title>Circle Boxes</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 100px;
        }

        .circle {
            width: 150px;
            height: 150px;
            /* Equal width & height */
            margin: 20px;
            background-color: lightblue;
            border: 4px solid black;
            border-radius: 50%;
            /* Makes it circle */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            transition: 0.3s;
        }

        .circle:hover {
            background-color: black;
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="circle">1</div>
        <div class="circle">2</div>
    </div>

</body>

</html>
